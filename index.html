<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edmonton–Prince Rupert Pipeline — Interactive Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; }

    #header {
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.02em;
    }

    #map {
      width: 100%;
      height: calc(100vh - 280px);
      min-height: 350px;
    }

    #elevation-wrapper {
      background: #fff;
      padding: 10px 20px 16px;
      height: 220px;
    }

    #elevation-canvas {
      width: 100%;
      height: 200px;
      display: block;
    }

    /* Info panel */
    .info-panel {
      background: rgba(255,255,255,0.96);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 0;
      min-width: 220px;
      max-width: 260px;
      font-size: 12px;
    }
    .info-panel h3 {
      background: #1a1a2e;
      color: #fff;
      margin: 0;
      padding: 8px 12px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .info-panel h3 .toggle-icon { font-size: 10px; }
    .info-panel .info-body { padding: 8px 12px 10px; }
    .info-panel table { border-collapse: collapse; width: 100%; }
    .info-panel td { padding: 2px 4px; vertical-align: top; }
    .info-panel td:first-child { font-weight: bold; white-space: nowrap; padding-right: 8px; }

    /* Legend panel */
    .legend-panel {
      background: rgba(255,255,255,0.96);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      min-width: 190px;
    }
    .legend-panel h4 {
      margin: 0 0 6px;
      font-size: 13px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
    }
    .legend-line {
      width: 28px;
      height: 4px;
      display: inline-block;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-line.dashed {
      background: repeating-linear-gradient(to right, #f97316 0, #f97316 5px, transparent 5px, transparent 9px);
      height: 4px;
    }
    .legend-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .legend-swatch {
      width: 18px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .legend-section-title {
      font-weight: bold;
      margin-top: 6px;
      margin-bottom: 2px;
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      #header { font-size: 0.85rem; padding: 8px; }
      #elevation-wrapper { height: 180px; }
      #elevation-canvas { height: 160px; }
    }
  </style>
</head>
<body>
  <div id="header">🛢️ Edmonton–Prince Rupert Pipeline — Interactive Route Map</div>
  <div id="map"></div>
  <div id="elevation-wrapper">
    <canvas id="elevation-canvas"></canvas>
  </div>

<script>
// ───────────────────────────── DATA ─────────────────────────────

const waypoints = [

// ────────────────────────── MAP INIT ────────────────────────────

const map = L.map('map', { zoomControl: true }).setView([54.5, -122.0], 5);

// ─────────────────────── LAYER GROUPS ───────────────────────────

const pipelineLayer     = L.layerGroup();
const waypointLayer     = L.layerGroup();
const pumpLayer         = L.layerGroup();
const hddLayer          = L.layerGroup();
const territoryLayer    = L.layerGroup();

// ──────────────────── PIPELINE ROUTE LINES ──────────────────────

// Standard section 2: waypoints 25–28 (Km 1475–1715)

// ───────────────────────── WAYPOINTS ────────────────────────────

  const isEndpoint = i === 0 || i === waypoints.length - 1;
  const isInMicro  = wp.km >= 1185 && wp.km <= 1475;
  const fillColor  = isInMicro ? '#f97316' : '#e53935';

  const marker = L.circleMarker([wp.lat, wp.lon], {
    radius:      isEndpoint ? 10 : 6,
    color:       '#fff',
    weight:      2,
    fillColor:   fillColor,
    fillOpacity: 0.9,
  });

  marker.bindPopup(
    `<strong>${wp.name}</strong><br/>
     Km: ${wp.km.toLocaleString()}<br/>
     Elevation: ${wp.elev} m<br/>
     Segment: ${wp.desc}${wp.special ? '<br/><em>' + wp.special + '</em>' : ''}`
  );

  marker.addTo(waypointLayer);
});

waypointLayer.addTo(map);

// ───────────────────────── PUMP STATIONS ─────────────────────────

    weight:      2,
    fillColor:   '#ffd700',
    fillOpacity: 0.95,

  marker.bindPopup(
    `<strong>${ps.id} — ${ps.name}</strong><br/>
     Type: ${ps.type}<br/>
     Km: ${ps.km.toLocaleString()}`

});

pumpLayer.addTo(map);

// ─────────────────────────── HDD CROSSINGS ──────────────────────

hddCrossings.forEach(hdd => {

    radius:      8,
    color:       '#1565c0',
    weight:      2,

  });

  marker.bindPopup(
    `<strong>${hdd.id} — ${hdd.name}</strong><br/>${hdd.desc}`
  );

  marker.addTo(hddLayer);
});

hddLayer.addTo(map);

// ───────────────────── INDIGENOUS TERRITORIES ───────────────────

territories.forEach(t => {
  const pts = waypoints.slice(t.startIdx, t.endIdx + 1);
  const lats = pts.map(p => p.lat);
  const lons = pts.map(p => p.lon);
  const pad  = 0.3;
  const minLat = Math.min(...lats) - pad;
  const maxLat = Math.max(...lats) + pad;
  const minLon = Math.min(...lons) - pad;
  const maxLon = Math.max(...lons) + pad;

  const polygon = L.rectangle(
    [[minLat, minLon], [maxLat, maxLon]],
    {
      color:       t.color,
      weight:      1.5,
      fillColor:   t.color,
      fillOpacity: t.fillOpacity,
      dashArray:   '4,4',
    }
  );

  polygon.bindPopup(`<strong>${t.name}</strong><br/>Indigenous Territory`);
  polygon.addTo(territoryLayer);
});

territoryLayer.addTo(map);

// ─────────────────────── ELEVATION PROFILE ──────────────────────

(function drawElevation() {
  const canvas = document.getElementById('elevation-canvas');
  // Set actual pixel dimensions
  canvas.width  = canvas.offsetWidth  || 800;
  canvas.height = canvas.offsetHeight || 200;

  const ctx   = canvas;
  const c     = ctx.getContext('2d');
  const W     = canvas.width;
  const H     = canvas.height;

  const PAD_LEFT   = 52;
  const PAD_RIGHT  = 20;
  const PAD_TOP    = 30;
  const PAD_BOTTOM = 36;

  const plotW = W - PAD_LEFT - PAD_RIGHT;
  const plotH = H - PAD_TOP  - PAD_BOTTOM;

  const MAX_KM   = 1715;
  const MAX_ELEV = 950;

  // Add Pine Pass virtual point between Chetwynd (km 590) and Kennedy (km 710)
  const elevData = [
    ...waypoints.slice(0, 9),          // 0-8: Edmonton .. Chetwynd
    { km: 660, elev: 875, name: "Pine Pass" }, // virtual
    ...waypoints.slice(9),             // 9-28: Kennedy .. Prince Rupert
  ];

  function xOf(km)   { return PAD_LEFT + (km / MAX_KM) * plotW; }
  function yOf(elev) { return PAD_TOP  + plotH - (elev / MAX_ELEV) * plotH; }

  // Background
  c.fillStyle = '#fff';
  c.fillRect(0, 0, W, H);

  // Title
  c.fillStyle = '#1a1a2e';
  c.font      = 'bold 13px sans-serif';
  c.textAlign = 'center';
  c.fillText('Elevation Profile — Edmonton to Prince Rupert (1,715 km)', W / 2, 16);

  // Grid lines and Y-axis labels
  c.strokeStyle = '#e0e0e0';
  c.lineWidth   = 1;
  c.fillStyle   = '#555';
  c.font        = '11px sans-serif';
  c.textAlign   = 'right';

  for (let e = 0; e <= MAX_ELEV; e += 200) {
    const y = yOf(e);
    c.beginPath();
    c.moveTo(PAD_LEFT, y);
    c.lineTo(PAD_LEFT + plotW, y);
    c.stroke();
    c.fillText(e + 'm', PAD_LEFT - 4, y + 4);
  }

  // X-axis labels
  c.textAlign = 'center';
  for (let km = 0; km <= MAX_KM; km += 200) {
    const x = xOf(km);
    c.beginPath();
    c.strokeStyle = '#e0e0e0';
    c.moveTo(x, PAD_TOP);
    c.lineTo(x, PAD_TOP + plotH);
    c.stroke();
    c.fillStyle = '#555';
    c.fillText(km + ' km', x, H - PAD_BOTTOM + 14);
  }

  // Axes
  c.strokeStyle = '#333';
  c.lineWidth   = 1.5;
  c.beginPath();
  c.moveTo(PAD_LEFT, PAD_TOP);
  c.lineTo(PAD_LEFT, PAD_TOP + plotH);
  c.lineTo(PAD_LEFT + plotW, PAD_TOP + plotH);
  c.stroke();

  // Draw filled area + line in two color segments
  function drawSegment(data, startI, endI, color, dashed) {
    if (startI >= endI) return;
    const pts = data.slice(startI, endI + 1);

    // Filled area
    c.beginPath();
    c.moveTo(xOf(pts[0].km), yOf(0));
    pts.forEach(p => c.lineTo(xOf(p.km), yOf(p.elev)));
    c.lineTo(xOf(pts[pts.length - 1].km), yOf(0));
    c.closePath();
    c.fillStyle = color.replace(')', ', 0.15)').replace('rgb', 'rgba');
    // Use hex-based fill with opacity instead
    c.globalAlpha = 0.15;
    c.fillStyle = color;
    c.fill();
    c.globalAlpha = 1;

    // Line
    c.beginPath();
    if (dashed) c.setLineDash([8, 5]);
    else        c.setLineDash([]);
    c.strokeStyle = color;
    c.lineWidth   = 2.5;
    pts.forEach((p, i) => i === 0 ? c.moveTo(xOf(p.km), yOf(p.elev)) : c.lineTo(xOf(p.km), yOf(p.elev)));
    c.stroke();
    c.setLineDash([]);
  }

  // Standard 1: index 0..indexOf first point km>=1185
  const microStartI = elevData.findIndex(p => p.km >= 1185);
  const microEndI   = elevData.findIndex(p => p.km >= 1475);

  drawSegment(elevData, 0,           microStartI, '#e53935', false);
  drawSegment(elevData, microStartI, microEndI,   '#f97316', true);
  drawSegment(elevData, microEndI,   elevData.length - 1, '#e53935', false);

  // Labels for high points
  const labelPoints = [
    { km: 270,  elev: 870,  text: 'Fox Creek 870m' },
    { km: 660,  elev: 875,  text: 'Pine Pass 875m' },
    { km: 1130, elev: 850,  text: 'Endako 850m'    },
  ];

  c.font      = 'bold 10px sans-serif';
  c.fillStyle = '#1a1a2e';
  c.textAlign = 'center';

  labelPoints.forEach(lp => {
    const x = xOf(lp.km);
    const y = yOf(lp.elev);
    c.beginPath();
    c.arc(x, y, 4, 0, Math.PI * 2);
    c.fillStyle = '#e53935';
    c.fill();
    c.fillStyle = '#1a1a2e';
    c.fillText(lp.text, x, y - 8);
  });
})();
</script>
</body>
</html>
